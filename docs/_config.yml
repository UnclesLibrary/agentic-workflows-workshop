title: GitHub Agentic Workflows Workshop
description: Complete workshop materials for teaching GitHub Agentic Workflows at community events
theme: jekyll-theme-cayman
markdown: kramdown

# Enable relative links
relative_links:
  enabled: true
  collections: true

# Plugins
plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-titles-from-headings

# Optional front matter
optional_front_matter:
  remove_originals: false

# Titles from headings
titles_from_headings:
  enabled: true
  strip_title: false
  collections: false

# Include directories that would normally be excluded
include:
  - workshop/images

# Exclude files from processing
exclude:
  - README.md
  - LICENSE
  - CONTRIBUTING.md
  - .github/
